<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="60" rx="8" fill="#1a1a1a"/>
  
  <!-- Logo Icon - Robot/Automation Symbol -->
  <g transform="translate(15, 10)">
    <!-- Robot Head -->
    <rect x="5" y="5" width="30" height="25" rx="4" fill="#00d4aa" stroke="#00b894" stroke-width="1.5"/>
    
    <!-- Robot Eyes -->
    <circle cx="13" cy="15" r="3" fill="#ffffff"/>
    <circle cx="27" cy="15" r="3" fill="#ffffff"/>
    
    <!-- Robot Antenna -->
    <line x1="20" y1="5" x2="20" y2="0" stroke="#00d4aa" stroke-width="2" stroke-linecap="round"/>
    <circle cx="20" cy="0" r="2" fill="#ff6b6b"/>
    
    <!-- Robot Body -->
    <rect x="8" y="30" width="24" height="15" rx="3" fill="#00d4aa" stroke="#00b894" stroke-width="1.5"/>
    
    <!-- Robot Arms -->
    <rect x="2" y="32" width="6" height="3" rx="1" fill="#00d4aa"/>
    <rect x="32" y="32" width="6" height="3" rx="1" fill="#00d4aa"/>
    
    <!-- Automation Lines -->
    <path d="M40 20 L50 20 L55 15 M40 25 L50 25 L55 30" stroke="#ffd93d" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M40 35 L50 35 L55 40 M40 40 L50 40 L55 35" stroke="#ffd93d" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Text: OpenAppCLI -->
  <text x="65" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">OpenAppCLI</text>
  <text x="65" y="42" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#00d4aa">Universal Automation</text>
  
  <!-- Decorative Elements -->
  <circle cx="180" cy="15" r="3" fill="#ffd93d" opacity="0.7"/>
  <circle cx="170" cy="45" r="2" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="185" cy="35" r="2.5" fill="#00d4aa" opacity="0.7"/>
</svg>
