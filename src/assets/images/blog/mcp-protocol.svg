<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Main Architecture Diagram -->
  <!-- AI Agent -->
  <g transform="translate(100, 50)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
    <text x="60" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">AI Agent</text>
    <circle cx="60" cy="50" r="8" fill="#60a5fa"/>
    <path d="M 56 46 L 60 54 L 64 46" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 220 90 L 280 90" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- MCP Client -->
  <g transform="translate(280, 50)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="60" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">MCP Client</text>
    <circle cx="60" cy="50" r="8" fill="#34d399"/>
    <path d="M 56 46 L 60 54 L 64 46" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 400 90 L 460 90" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- MCP Server -->
  <g transform="translate(460, 50)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
    <text x="60" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">MCP Server</text>
    <circle cx="60" cy="50" r="8" fill="#a78bfa"/>
    <path d="M 56 46 L  60 54 L 64 46" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 580 90 L 640 90" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Application -->
  <g transform="translate(640, 50)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
    <text x="60" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Application</text>
    <circle cx="60" cy="50" r="8" fill="#f87171"/>
    <path d="M 56 46 L 60 54 L 64 46" stroke="white" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Tool System -->
  <g transform="translate(100, 180)">
    <rect x="0" y="0" width="100" height="60" rx="6" fill="#e0e7ff" stroke="#1976d2" stroke-width="2"/>
    <text x="50" y="25" text-anchor="middle" fill="#1976d2" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Tools</text>
    
    <!-- Tool Items -->
    <rect x="10" y="35" width="80" height="8" rx="4" fill="#3b82f6"/>
    <rect x="10" y="45" width="80" height="8" rx="4" fill="#3b82f6"/>
    <rect x="10" y="55" width="80" height="8" rx="4" fill="#3b82f6"/>
  </g>
  
  <!-- Resource System -->
  <g transform="translate(230, 180)">
    <rect x="0" y="0" width="100" height="60" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
    <text x="50" y="25" text-anchor="middle" fill="#0ea5e9" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Resources</text>
    
    <!-- Resource Items -->
    <rect x="10" y="35" width="80" height="8" rx="4" fill="#0284c7"/>
    <rect x="10" y="45" width="80" height="8" rx="4" fill="#0284c7"/>
    <rect x="10" y="55" width="80" height="8" rx="4" fill="#0284c7"/>
  </g>
  
  <!-- Prompt System -->
  <g transform="translate(360, 180)">
    <rect x="0" y="0" width="100" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="50" y="25" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Prompts</text>
    
    <!-- Prompt Items -->
    <rect x="10" y="35" width="80" height="8" rx="4" fill="#f59e0b"/>
    <rect x="10" y="45" width="80" height="8" rx="4" fill="#f59e0b"/>
    <rect x="10" y="55" width="80" height="8" rx="4" fill="#f59e0b"/>
  </g>
  
  <!-- Bidirectional Arrows -->
  <path d="M 200 210 L 200 250 M 210 230 L 190 230 M 210 240 L 190 240" stroke="#64748b" stroke-width="2"/>
  <path d="M 330 210 L 330 250 M 340 230 L 320 230 M 340 240 L 320 240" stroke="#64748b" stroke-width="2"/>
  <path d="M 460 210 L 460 250 M 470 230 L 450 230 M 470 240 L 450 240" stroke="#64748b" stroke-width="2"/>
  
  <!-- Protocol Details -->
  <g transform="translate(100, 280)">
    <rect x="0" y="0" width="600" height="80" rx="8" fill="#f1f5f9" stroke="#e5e7eb" stroke-width="1"/>
    <text x="300" y="25" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="14" font-weight="bold">MCP Protocol Features</text>
    
    <!-- Feature List -->
    <text x="20" y="45" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">• JSON-RPC 2.0 based</text>
    <text x="20" y="60" y="6b7280" font-family="Arial, sans-serif" font-size="11">• Type-safe schema validation</text>
    <text x="320" y="45" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">• Error handling & recovery</text>
    <text x="320" y="60" y="6b7280" font-family="Arial, sans-serif" font-size="11">• Extensible architecture</text>
    <text x="420" y="45" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">• Session management</text>
    <text x="420" y="60" y="6b7280" font-family="Arial, sans-serif" font-size="11">• Rate limiting</text>
  </g>
  
  <!-- Example Code Block -->
  <g transform="translate(100, 370)">
    <rect x="0" y="0" width="600" height="80" rx="8" fill="#1e293b" stroke="#1e293b" stroke-width="1"/>
    <text x="10" y="20" fill="#f3f4f6" font-family="monospace" font-size="11" font-weight="bold">// MCP Tool Call Example</text>
    <text x="10" y="35" fill="#f3f4f6" font-family="monospace" font-size="10">const tools = await mcpClient.listTools();</text>
    <text x="10" y="50" fill="#f3f4f6" font-family="monospace" font-size="10">const result = await mcpClient.callTool('bilibili_hot');</text>
    <text x="10" y="65" fill="#f3f4f6" font-family="monospace" font-size="10">console.log('Hot videos:', result.videos);</text>
  </g>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 5, 5 0, 10" fill="#64748b"/>
    </marker>
  </defs>
</svg>
