# Use DecapBridge auth (required)
# REPLACE WITH YOUR OWN CREDENTIALS - See README.md for tutorial
backend:
    name: git-gateway
    repo: OpenAppCLI/Advanced-Astro-i18n
    branch: main
    auth_type: pkce
    base_url: https://auth.decapbridge.com
    auth_endpoint: /sites/e1004ade-7b8d-4155-be79-243e5bb39f2d/pkce
    auth_token_endpoint: /sites/e1004ade-7b8d-4155-be79-243e5bb39f2d/token
    gateway_url: https://gateway.decapbridge.com

    # See who did what (optional)
    commit_messages:
        create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
        update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
        delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
        uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
        deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
        openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
    email_claim: email
    first_name_claim: first_name
    last_name_claim: last_name
    avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://advanced-astro-kit-i18n.netlify.app

media_folder: src/assets/images/blog # Location where files will be stored in the repo - we store them in src so that Astro can optimize them.
public_folder: "@assets/images/blog" # Same folder as above, but using a path alias for easier referencing in the markdown files.

i18n:
    structure: multiple_folders
    locales: [en, fr]
    default_locale: en

collections:
    - name: "blog"
      label: "Blog"
      folder: "src/content/blog"
      create: true
      i18n: true
      fields:
          - { label: "Title", name: "title", widget: "string", i18n: true }
          - {
                label: "Permalink",
                name: "permalink",
                widget: "string",
                i18n: true,
                required: true,
                hint: "The URL slug for this post. Use lowercase letters, numbers, and hyphens only — no spaces or special characters. Example: my-post-title. Once published, avoid changing this or existing links will break.",
            }
          - {
                label: "Description",
                name: "description",
                widget: "string",
                i18n: true,
                required: true,
            }
          - {
                label: "Author",
                name: "author",
                widget: "string",
                i18n: duplicate,
                required: true,
            }
          - {
                label: "Date",
                name: "date",
                widget: "datetime",
                i18n: duplicate,
                required: true,
            }
          - {
                label: "Cover Image",
                name: "image",
                widget: "image",
                i18n: duplicate,
                required: true,
            }
          - {
                label: "Image Alt",
                name: "imageAlt",
                widget: "string",
                i18n: true,
                required: true,
            }
          - {
                label: "Featured",
                name: "featured",
                widget: "boolean",
                default: false,
                i18n: duplicate,
            }
          - {
                label: "Mapping Key",
                name: "mappingKey",
                widget: "string",
                i18n: duplicate,
                required: true,
                hint: "URL-friendly identifier. Used to 'link' translated blog posts for SEO purposes",
            }
          - { label: "Body", name: "body", widget: "markdown", i18n: true }
